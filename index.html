<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Ronda de Organização e Conformidade – Passagem de Turno</title>
    <!-- jsPDF e html2canvas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }
        body {
            background: #f2f2f2;
            padding: 12px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            background: linear-gradient(rgba(255,255,255,0.9), rgba(255,255,255,0.9)), 
                        url('https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?ixlib=rb-4.0.3&auto=format&fit=crop&w=1350&q=80') no-repeat center center;
            background-size: cover;
            border-radius: 28px 28px 20px 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            overflow: hidden;
            padding: 20px 18px 30px;
        }
        .header {
            border-bottom: 2px solid #FFC600;
            padding-bottom: 12px;
            margin-bottom: 20px;
        }
        .header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #007269;
            letter-spacing: -0.5px;
            line-height: 1.2;
        }
        .header h1 span {
            color: #FF671F;
            font-weight: 800;
        }
        .manager-card {
            background: #f0f4fa;
            border-radius: 20px;
            padding: 16px;
            margin: 15px 0 20px;
            border-left: 8px solid #FF671F;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
        }
        .manager-info {
            flex: 2 1 250px;
            min-width: 200px;
        }
        .manager-label {
            font-size: 0.85rem;
            text-transform: uppercase;
            color: #2c3e50;
            letter-spacing: 1px;
            font-weight: 600;
        }
        .manager-name {
            font-size: 1.6rem;
            font-weight: 800;
            color: #007269;
            line-height: 1.2;
            word-break: break-word;
        }
        .manager-shift {
            font-size: 1rem;
            color: #007269;
            font-weight: 500;
            background: rgba(0,114,105,0.1);
            display: inline-block;
            padding: 4px 14px;
            border-radius: 40px;
            margin-top: 6px;
        }
        .manager-controls {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
            flex: 1 1 200px;
        }
        .manager-selector {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        .manager-selector select {
            padding: 8px 12px;
            border-radius: 40px;
            border: 1px solid #007269;
            background: white;
            color: #007269;
            font-weight: 600;
            cursor: pointer;
            min-width: 180px;
        }
        .manager-selector button {
            background: #FF671F;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }
        .section-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #007269;
            margin: 24px 0 12px 0;
            padding-left: 8px;
            border-left: 6px solid #FFC600;
        }
        .rua-card {
            background: #ffffff;
            border-radius: 20px;
            padding: 16px 14px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border: 2px solid #007269;
            position: relative;
        }
        .rua-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-right: 30px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .rua-header h3 {
            color: #007269;
            font-size: 1.3rem;
        }
        .rua-classificacao {
            font-size: 1.2rem;
            font-weight: 700;
            padding: 5px 15px;
            border-radius: 30px;
            background: #f0f4fa;
        }
        .class-aceitavel { color: #2e7d32; background: #e8f5e8; }
        .class-moderada { color: #b85e00; background: #fff0e0; }
        .class-critica { color: #b71c1c; background: #ffebee; }
        .remove-rua {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #FF671F;
            color: white;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            font-weight: bold;
            cursor: pointer;
        }
        .question {
            font-weight: 600;
            font-size: 1.05rem;
            margin: 15px 0 8px;
            color: #1a2b3c;
        }
        .required-star {
            color: #FF671F;
            font-size: 1.3rem;
            line-height: 1;
            margin-left: 4px;
        }
        .hint {
            font-size: 0.85rem;
            color: #5e6f7d;
            margin-top: -5px;
            margin-bottom: 12px;
            font-style: italic;
            background: #f9fafc;
            padding: 6px 10px;
            border-radius: 12px;
        }
        .options {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }
        .option-item {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #f3f6f9;
            padding: 8px 16px;
            border-radius: 40px;
            border: 1px solid #d0dbe8;
        }
        .option-item input[type="radio"] {
            width: 20px;
            height: 20px;
            accent-color: #007269;
        }
        .plano-acao-area {
            margin-top: 10px;
            margin-bottom: 15px;
            padding: 12px;
            background: #fff3e0;
            border-radius: 16px;
            border-left: 4px solid #FF671F;
            display: none;
        }
        .plano-acao-area label {
            font-weight: 600;
            color: #b85e00;
            display: block;
            margin-bottom: 5px;
        }
        .plano-acao-area textarea {
            width: 100%;
            padding: 10px;
            border-radius: 12px;
            border: 1px solid #ccc;
            font-family: inherit;
            resize: vertical;
            min-height: 70px;
        }
        .plano-acao-area.visible {
            display: block;
        }
        .file-area {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .file-btn {
            background: #FF671F;
            color: white;
            font-weight: 600;
            padding: 14px 20px;
            border-radius: 40px;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            display: inline-block;
            width: fit-content;
            box-shadow: 0 4px 8px rgba(255,103,31,0.3);
        }
        .image-preview-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }
        .preview-item {
            position: relative;
            width: 80px;
            height: 80px;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #007269;
        }
        .preview-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .remove-img {
            position: absolute;
            top: 2px;
            right: 2px;
            background: #FF671F;
            color: white;
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 12px;
            cursor: pointer;
        }
        .add-rua-btn {
            background: #007269;
            color: white;
            font-weight: 600;
            padding: 14px 20px;
            border-radius: 40px;
            border: none;
            font-size: 1.1rem;
            cursor: pointer;
            margin: 10px 0 20px;
            width: 100%;
        }
        .signature-area {
            margin: 20px 0 10px;
            background: #fafbfc;
            border-radius: 20px;
            padding: 16px;
            border: 1px dashed #007269;
        }
        .signature-canvas {
            width: 100%;
            height: auto;
            background: white;
            border: 2px solid #cbd5e1;
            border-radius: 16px;
            touch-action: none;
            aspect-ratio: 500 / 150;
        }
        .signature-actions {
            display: flex;
            gap: 12px;
            margin-top: 12px;
        }
        .signature-btn {
            background: #eaeef2;
            border: none;
            padding: 12px 18px;
            border-radius: 40px;
            font-weight: 600;
            color: #007269;
            flex: 1;
            cursor: pointer;
        }
        .signature-btn.clear {
            background: #f3d8d8;
            color: #a33b3b;
        }
        .password-field {
            width: 100%;
            padding: 16px 18px;
            border: 1px solid #cbd5e1;
            border-radius: 60px;
            font-size: 1.2rem;
            margin: 10px 0;
            text-align: center;
            letter-spacing: 4px;
        }
        .finalize-btn {
            background: #007269;
            color: white;
            font-size: 1.4rem;
            font-weight: 700;
            padding: 18px 20px;
            border: none;
            border-radius: 60px;
            width: 100%;
            margin-top: 30px;
            box-shadow: 0 8px 16px rgba(0,114,105,0.3);
            cursor: pointer;
        }
        .finalize-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        footer {
            text-align: center;
            color: #7f8c8d;
            font-size: 0.8rem;
            margin-top: 20px;
        }
        /* Modal de seleção de rua (existente) */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .modal-box {
            background: white;
            max-width: 350px;
            width: 90%;
            border-radius: 28px;
            padding: 24px 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border-left: 8px solid #FF671F;
        }
        .modal-box h3 {
            color: #007269;
            margin-bottom: 15px;
        }
        .modal-option {
            display: flex;
            align-items: center;
            padding: 12px;
            margin: 5px 0;
            background: #f3f6f9;
            border-radius: 40px;
            border: 1px solid #d0dbe8;
        }
        .modal-option input[type="radio"] {
            width: 20px;
            height: 20px;
            accent-color: #007269;
            margin-right: 10px;
        }
        .modal-option.disabled {
            opacity: 0.5;
            background: #e0e0e0;
        }
        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .modal-btn {
            flex: 1;
            background: #007269;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
        }
        .modal-btn.cancel {
            background: #ccc;
            color: #333;
        }
        /* Modal personalizado de aviso/confirmação */
        .custom-modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 2100;
        }
        .custom-modal-box {
            background: white;
            max-width: 380px;
            width: 90%;
            border-radius: 28px;
            padding: 24px 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border-left: 8px solid #FF671F;
            text-align: center;
        }
        .custom-modal-icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }
        .custom-modal-title {
            color: #007269;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 10px;
        }
        .custom-modal-message {
            color: #333;
            font-size: 1.1rem;
            margin-bottom: 20px;
            word-wrap: break-word;
        }
        .custom-modal-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .custom-modal-btn {
            background: #007269;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            min-width: 100px;
        }
        .custom-modal-btn.confirm {
            background: #FF671F;
        }
        .custom-modal-btn.cancel {
            background: #ccc;
            color: #333;
        }
        .spinner {
            border: 4px solid rgba(0,0,0,0.1);
            border-left-color: #007269;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 10px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Ronda de Organização e Conformidade <span>– Passagem de Turno</span></h1>
    </div>

    <!-- Card do gerente -->
    <div class="manager-card" id="managerCard">
        <div class="manager-info">
            <div class="manager-label">responsável do turno</div>
            <div class="manager-name" id="currentManagerName">Carregando...</div>
            <div class="manager-shift" id="currentManagerShift"></div>
        </div>
        <div class="manager-controls">
            <div class="manager-selector">
                <select id="manualManagerSelect">
                    <option value="auto">Automático</option>
                    <option value="Eduardo Barbosa">Eduardo Barbosa (6h-14h)</option>
                    <option value="Amanda Bertulino">Amanda Bertulino (14h-22h)</option>
                    <option value="Christopher Borges">Christopher Borges (22h-6h)</option>
                </select>
                <button id="applyManualManager">Aplicar</button>
            </div>
        </div>
    </div>

    <!-- Container das avaliações de ruas -->
    <div id="ruasContainer"></div>

    <button class="add-rua-btn" id="addRuaBtn">➕ Adicionar nova rua</button>

    <!-- Seção de assinatura e senha -->
    <div class="section-title">Finalização do turno</div>
    <div class="question-group" style="background:white; border-radius:20px; padding:16px;">
        <div class="question">Assinatura do gerente (opcional)</div>
        <div class="signature-area">
            <canvas id="signatureCanvas" class="signature-canvas" width="500" height="150"></canvas>
            <div class="signature-actions">
                <button type="button" class="signature-btn" id="undoSignature">↩ Desfazer</button>
                <button type="button" class="signature-btn clear" id="clearSignature">🗑 Limpar</button>
            </div>
        </div>
        <div class="question">Senha de validação <span class="required-star">*</span></div>
        <input type="password" id="senhaValidacao" class="password-field" placeholder="****" maxlength="4" inputmode="numeric">
    </div>

    <button class="finalize-btn" id="finalizeBtn">🔒 Finalizar Checklist (Gerar PDF Consolidado)</button>
    <footer>Ronda de Organização e Conformidade – Passagem de Turno • Múltiplas Ruas</footer>
</div>

<!-- Modal de seleção de rua (existente) -->
<div class="modal-overlay" id="ruaModal">
    <div class="modal-box">
        <h3>Selecione a rua</h3>
        <div id="modalOptionsContainer"></div>
        <div class="modal-actions">
            <button class="modal-btn cancel" id="modalCancel">Cancelar</button>
            <button class="modal-btn" id="modalConfirm">Confirmar</button>
        </div>
    </div>
</div>

<!-- Modal personalizado de aviso/confirmação -->
<div class="custom-modal-overlay" id="customModal">
    <div class="custom-modal-box">
        <div class="custom-modal-icon" id="customModalIcon">⚠️</div>
        <div class="custom-modal-title" id="customModalTitle">Aviso</div>
        <div class="custom-modal-message" id="customModalMessage"></div>
        <div class="custom-modal-actions" id="customModalActions">
            <button class="custom-modal-btn" id="customModalOk">OK</button>
        </div>
    </div>
</div>

<script>
    (function() {
        // ========== MODAL PERSONALIZADO ==========
        const customModal = document.getElementById('customModal');
        const customModalIcon = document.getElementById('customModalIcon');
        const customModalTitle = document.getElementById('customModalTitle');
        const customModalMessage = document.getElementById('customModalMessage');
        const customModalActions = document.getElementById('customModalActions');
        let customModalResolve = null;

        function showModal(message, title = 'Aviso', icon = '⚠️') {
            return new Promise((resolve) => {
                customModalIcon.textContent = icon;
                customModalTitle.textContent = title;
                customModalMessage.textContent = message;
                customModalActions.innerHTML = '<button class="custom-modal-btn" id="customModalOk">OK</button>';
                customModal.style.display = 'flex';
                
                const okBtn = document.getElementById('customModalOk');
                const closeHandler = () => {
                    customModal.style.display = 'none';
                    okBtn.removeEventListener('click', closeHandler);
                    resolve();
                };
                okBtn.addEventListener('click', closeHandler);
            });
        }

        function showConfirmModal(message, title = 'Confirmação', icon = '❓') {
            return new Promise((resolve) => {
                customModalIcon.textContent = icon;
                customModalTitle.textContent = title;
                customModalMessage.textContent = message;
                customModalActions.innerHTML = `
                    <button class="custom-modal-btn cancel" id="customModalCancel">Cancelar</button>
                    <button class="custom-modal-btn confirm" id="customModalConfirm">Confirmar</button>
                `;
                customModal.style.display = 'flex';

                const confirmBtn = document.getElementById('customModalConfirm');
                const cancelBtn = document.getElementById('customModalCancel');

                const confirmHandler = () => {
                    customModal.style.display = 'none';
                    cleanup();
                    resolve(true);
                };
                const cancelHandler = () => {
                    customModal.style.display = 'none';
                    cleanup();
                    resolve(false);
                };
                const cleanup = () => {
                    confirmBtn.removeEventListener('click', confirmHandler);
                    cancelBtn.removeEventListener('click', cancelHandler);
                };

                confirmBtn.addEventListener('click', confirmHandler);
                cancelBtn.addEventListener('click', cancelHandler);
            });
        }

        // Substituir alert e confirm nativos (opcional, mas vamos usar as funções acima)
        window.customAlert = showModal;
        window.customConfirm = showConfirmModal;

        // ========== DEFINIÇÃO DOS GESTORES E SUAS RUAS ==========
        const managers = [
            { 
                name: "Eduardo Barbosa", 
                shift: "06:00 – 14:00", 
                start: 6, 
                end: 14, 
                password: "1111",
                ruas: ['Rua 8', 'Rua 12', 'Rua 13', 'Rua 14']
            },
            { 
                name: "Amanda Bertulino", 
                shift: "14:00 – 22:00", 
                start: 14, 
                end: 22, 
                password: "2222",
                ruas: ['Rua 15', 'Rua 16']
            },
            { 
                name: "Christopher Borges", 
                shift: "22:00 – 06:00", 
                start: 22, 
                end: 6, 
                password: "3333",
                ruas: ['Rua 18', 'Rua 19']
            }
        ];

        let manualManager = null;
        let currentManager = managers[0];

        function getCurrentManagerByTime() {
            const now = new Date();
            const hour = now.getHours();
            for (let m of managers) {
                if (m.start < m.end) {
                    if (hour >= m.start && hour < m.end) return m;
                } else {
                    if (hour >= m.start || hour < m.end) return m;
                }
            }
            return managers[0];
        }

        function getCurrentManager() {
            if (manualManager) {
                return manualManager;
            }
            return getCurrentManagerByTime();
        }

        function updateManagerUI() {
            const m = getCurrentManager();
            document.getElementById('currentManagerName').innerText = m.name;
            document.getElementById('currentManagerShift').innerText = `Turno • ${m.shift}`;
            currentManager = m;
        }

        // ========== VERIFICAÇÃO DE COMPATIBILIDADE DE RUAS ==========
        function todasRuasPertencemAoGestor(gestor) {
            const ruasAdicionadas = ruasData.map(card => card.ruaSelecionada);
            return ruasAdicionadas.every(rua => gestor.ruas.includes(rua));
        }

        function removerTodasRuas() {
            ruasData.forEach(card => card.element.remove());
            ruasData = [];
        }

        // ========== LÓGICA DE MUDANÇA DE GESTOR ==========
        async function tentarMudarParaGestor(novoGestor) {
            if (!novoGestor) return false;
            const gestorAntigo = getCurrentManager();
            if (gestorAntigo.name === novoGestor.name) return true;

            if (ruasData.length > 0) {
                if (!todasRuasPertencemAoGestor(novoGestor)) {
                    const confirmar = await showConfirmModal(
                        `As ruas atuais não pertencem a ${novoGestor.name}. Deseja removê-las e continuar?`,
                        'Mudança de gestor',
                        '🔄'
                    );
                    if (confirmar) {
                        removerTodasRuas();
                    } else {
                        return false;
                    }
                }
            }
            return true;
        }

        document.getElementById('applyManualManager').addEventListener('click', async function() {
            const select = document.getElementById('manualManagerSelect');
            const value = select.value;
            let novoGestor = null;
            if (value === 'auto') {
                novoGestor = getCurrentManagerByTime();
                if (await tentarMudarParaGestor(novoGestor)) {
                    manualManager = null;
                    updateManagerUI();
                } else {
                    select.value = manualManager ? manualManager.name : 'auto';
                }
            } else {
                novoGestor = managers.find(m => m.name === value);
                if (await tentarMudarParaGestor(novoGestor)) {
                    manualManager = novoGestor;
                    updateManagerUI();
                } else {
                    select.value = manualManager ? manualManager.name : 'auto';
                }
            }
        });

        setInterval(() => {
            if (manualManager) return;
            const novoGestor = getCurrentManagerByTime();
            const gestorAtual = getCurrentManager();
            if (novoGestor.name !== gestorAtual.name) {
                if (ruasData.length === 0 || todasRuasPertencemAoGestor(novoGestor)) {
                    updateManagerUI();
                } else {
                    console.log('Turno mudou, mas há ruas incompatíveis. Mantendo gestor anterior.');
                }
            }
        }, 60000);

        // ========== MODAL DE SELEÇÃO DE RUA ==========
        const ruaModal = document.getElementById('ruaModal');
        const modalOptions = document.getElementById('modalOptionsContainer');
        const modalConfirm = document.getElementById('modalConfirm');
        const modalCancel = document.getElementById('modalCancel');
        let currentResolve = null;

        function abrirModalSelecaoRua() {
            return new Promise((resolve) => {
                currentResolve = resolve;
                const gestorAtual = getCurrentManager();
                const ruasDisponiveis = gestorAtual.ruas;
                const ruasUsadas = getRuasUsadas();

                let html = '';
                ruasDisponiveis.forEach(rua => {
                    const disabled = ruasUsadas.includes(rua) ? 'disabled' : '';
                    html += `<div class="modal-option ${disabled ? 'disabled' : ''}">

            const element = cardData.element;
            const obstruida = element.querySelector('input[name^="obstruida_"]:checked')?.value;
            const limpa = element.querySelector('input[name^="limpa_"]:checked')?.value;
            const palletsFora = element.querySelector('input[name^="palletsFora_"]:checked')?.value;
            const palletsRua = element.querySelector('input[name^="palletsRua_"]:checked')?.value;
            const avarias = element.querySelector('input[name^="avarias_"]:checked')?.value;
            const predios = element.querySelector('input[name^="prediosSinalizados_"]:checked')?.value;
            const divergencia = element.querySelector('input[name^="divergencia_"]:checked')?.value;
            const altura = element.querySelector('input[name^="altura_"]:checked')?.value;

            if (!obstruida || !limpa || !palletsFora || !palletsRua || !avarias || !predios || !divergencia || !altura) {
                return null;
            }

            let score = 0;
            if (obstruida === 'Sim') score += 3;
            if (limpa === 'Não') score += 2;
            if (palletsFora === 'Mais de 5') score += 3;
            else if (palletsFora === 'Menos de 5') score += 1;
            if (palletsRua === 'Sim') score += 2;
            if (avarias === 'Mais de 5') score += 3;
            else if (avarias === 'Menos de 5') score += 1;
            if (predios === 'Não') score += 2;
            else if (predios === 'Parcialmente') score += 1;
            if (divergencia === 'Sim') score += 2;
            if (altura === 'Não') score += 3;

            let classificacao = 'Aceitável';
            let classe = 'class-aceitavel';
            if (score > 4) { classificacao = 'Moderada'; classe = 'class-moderada'; }
            if (score > 8) { classificacao = 'Crítica'; classe = 'class-critica'; }

            return { score, classificacao, classe };
        }

        // ========== ASSINATURA CANVAS ==========
        const canvas = document.getElementById('signatureCanvas');
        const ctx = canvas.getContext('2d');
        let signatureDrawn = false;
        let undoStack = [];

        function initCanvas() {
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.lineWidth = 2;
            ctx.lineCap = 'round';
            ctx.strokeStyle = '#007269';
            signatureDrawn = false;
            undoStack = [canvas.toDataURL()];
        }

        function saveState() {
            undoStack.push(canvas.toDataURL());
            if (undoStack.length > 20) undoStack.shift();
        }

        function getCanvasCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let clientX, clientY;
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
        }

        let drawing = false;
        function startDrawing(e) {
            e.preventDefault();
            drawing = true;
            signatureDrawn = true;
            const { x, y } = getCanvasCoords(e);
            ctx.beginPath();
            ctx.moveTo(x, y);
        }
        function draw(e) {
            e.preventDefault();
            if (!drawing) return;
            const { x, y } = getCanvasCoords(e);
            ctx.lineTo(x, y);
            ctx.stroke();
        }
        function stopDrawing(e) {
            e.preventDefault();
            if (drawing) {
                drawing = false;
                ctx.closePath();
                saveState();
            }
        }
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseleave', stopDrawing);
        canvas.addEventListener('touchstart', startDrawing, { passive: false });
        canvas.addEventListener('touchmove', draw, { passive: false });
        canvas.addEventListener('touchend', stopDrawing);

        document.getElementById('undoSignature').addEventListener('click', function() {
            if (undoStack.length > 1) {
                undoStack.pop();
                const img = new Image();
                img.src = undoStack[undoStack.length-1];
                img.onload = () => {
                    ctx.clearRect(0,0,canvas.width,canvas.height);
                    ctx.drawImage(img,0,0,canvas.width,canvas.height);
                };
                signatureDrawn = undoStack.length > 1;
            } else {
                showModal('Nada para desfazer.', 'Informação', 'ℹ️');
            }
        });

        document.getElementById('clearSignature').addEventListener('click', async function() {
            const confirmar = await showConfirmModal('Tem certeza que deseja limpar a assinatura?', 'Limpar assinatura', '🗑️');
            if (confirmar) {
                ctx.clearRect(0,0,canvas.width,canvas.height);
                ctx.fillStyle = 'white';
                ctx.fillRect(0,0,canvas.width,canvas.height);
                signatureDrawn = false;
                undoStack = [canvas.toDataURL()];
            }
        });

                    if (!planoPalletsRua) missingPlano = true;
                }
                if (altura === 'Não') {
                    planoAltura = card.element.querySelector('textarea[name^="planoAltura_"]')?.value.trim() || '';
                    if (!planoAltura) missingPlano = true;
                }

                if (!obstruida || !limpa || !palletsFora || !palletsRua || !avarias || !predios || !divergencia || !altura) {
                    allValid = false;
                    return;
                }

                let score = 0;
                if (obstruida === 'Sim') score += 3;
                if (limpa === 'Não') score += 2;
                if (palletsFora === 'Mais de 5') score += 3;
                else if (palletsFora === 'Menos de 5') score += 1;
                if (palletsRua === 'Sim') score += 2;
                if (avarias === 'Mais de 5') score += 3;
                else if (avarias === 'Menos de 5') score += 1;
                if (predios === 'Não') score += 2;
                else if (predios === 'Parcialmente') score += 1;

        // ========== NOVA FUNÇÃO: VERIFICAR SE TODAS AS RUAS DO GESTOR FORAM PREENCHIDAS ==========
        function verificarTodasRuasGestorPreenchidas() {
            const gestorAtual = getCurrentManager();
            const ruasGestor = gestorAtual.ruas; // Array de ruas que o gestor é responsável
            const ruasPreenchidas = ruasData.map(card => card.ruaSelecionada);
            
            // Verificar se todas as ruas do gestor estão presentes nas ruas preenchidas
            const todasRuasPreenchidas = ruasGestor.every(rua => ruasPreenchidas.includes(rua));
            
            if (!todasRuasPreenchidas) {
                const ruasFaltando = ruasGestor.filter(rua => !ruasPreenchidas.includes(rua));
                const mensagem = `O gestor ${gestorAtual.name} é responsável pelas seguintes ruas que ainda não foram preenchidas: ${ruasFaltando.join(', ')}. Adicione todas as ruas obrigatórias antes de finalizar.`;
                showModal(mensagem, 'Ruas incompletas', '⚠️');
                return false;
            }
            
            return true;
        }

        // ========== GERAR PDF ==========
        async function generateConsolidatedPDF(data, signatureDataURL) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const manager = data.manager;
            const dateStr = new Date().toLocaleString('pt-BR');

            function addFooter() {
                const pageWidth = doc.internal.pageSize.width;
                const pageHeight = doc.internal.pageSize.height;
                const margin = 14;
                const footerY = pageHeight - 15;

                doc.setDrawColor(200,200,200);
                doc.line(margin, footerY - 3, pageWidth - margin, footerY - 3);

                if (signatureDataURL && signatureDrawn) {
                    const sigHeight = 10;
                    const sigWidth = (canvas.width / canvas.height) * sigHeight;
                    doc.addImage(signatureDataURL, 'PNG', margin, footerY - sigHeight, sigWidth, sigHeight);
                    doc.setFontSize(8);
                    doc.text(`Assinado por: ${manager.name} - ${dateStr}`, margin + sigWidth + 5, footerY - 2);
                } else {
                    doc.setFontSize(8);
                    doc.text(`Documento gerado por: ${manager.name} - ${dateStr}`, margin, footerY - 2);
                }
            }

            for (let i = 0; i < data.ruas.length; i++) {
                if (i > 0) doc.addPage();
                const r = data.ruas[i];

                doc.setFillColor(0, 114, 105);
                doc.rect(0, 0, 210, 20, 'F');
                doc.setTextColor(255, 255, 255);
                doc.setFontSize(16);
                doc.text('Ronda de Organização e Conformidade – Passagem de Turno', 14, 14);

                doc.setTextColor(0, 0, 0);
                doc.setFontSize(10);
                doc.text(`Gerente: ${manager.name} (${manager.shift})`, 14, 30);
                doc.text(`Data: ${dateStr}`, 14, 37);
                doc.text(`Rua: ${r.rua}`, 14, 44);

                doc.line(14, 48, 196, 48);

                let y = 58;
                const fields = [
                    ['Obstruída', r.obstruida],
                    ['Limpa', r.limpa],
                    ['Pallets fora', r.palletsFora],
                    ['Pallets na rua', r.palletsRua],
                    ['Avarias', r.avarias],
                    ['Prédios sinalizados', r.predios],
                    ['Divergência', r.divergencia],
                    ['Altura empilhamento', r.altura === 'Sim' ? 'Conforme' : 'Não conforme'],
                    ['Classificação', `${r.classificacao} (${r.pontuacao} pts)`]
                ];
                fields.forEach(([label, value]) => {
                    doc.text(`${label}: ${value}`, 14, y);
                    y += 7;
                });

                if (r.planoObstruida) {
                    doc.text('Plano de ação (obstrução):', 14, y);
                    y += 5;
                    doc.setFontSize(8);
                    const lines = doc.splitTextToSize(r.planoObstruida, 180);
                    doc.text(lines, 14, y);
                    y += lines.length * 4 + 5;
                    doc.setFontSize(10);
                }
                if (r.planoPalletsRua) {
                    doc.text('Plano de ação (pallets aguardando):', 14, y);
                    y += 5;
                    doc.setFontSize(8);
                    const lines = doc.splitTextToSize(r.planoPalletsRua, 180);
                    doc.text(lines, 14, y);
                    y += lines.length * 4 + 5;
                    doc.setFontSize(10);
                }
                if (r.planoAltura) {
                    doc.text('Plano de ação (altura):', 14, y);
                    y += 5;
                    doc.setFontSize(8);
                    const lines = doc.splitTextToSize(r.planoAltura, 180);
                    doc.text(lines, 14, y);
                    y += lines.length * 4 + 5;
                    doc.setFontSize(10);
                }

                addFooter();

                for (let j = 0; j < r.images.length; j++) {
                    doc.addPage();
                    doc.setFillColor(0, 114, 105);
                    doc.rect(0, 0, 210, 15, 'F');
                    doc.setTextColor(255, 255, 255);
                    doc.setFontSize(12);
                    doc.text(`Foto ${j+1} - ${r.rua}`, 14, 11);
                    doc.setTextColor(0, 0, 0);
                    
                    const imgData = r.images[j].dataURL;
                    const imgProps = doc.getImageProperties(imgData);
                    const maxWidth = 190;
                    const maxHeight = 250;
                    let width = maxWidth;
                    let height = (imgProps.height * width) / imgProps.width;
                    if (height > maxHeight) {
                        height = maxHeight;
                        width = (imgProps.width * height) / imgProps.height;
                    }
                    doc.addImage(imgData, 'JPEG', 10, 20, width, height);
                    
                    addFooter();
                }
            }

            doc.addPage();
            doc.setFillColor(0, 114, 105);
            doc.rect(0, 0, 210, 20, 'F');
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(16);
            doc.text('Resumo da Inspeção', 14, 14);

            doc.setTextColor(0, 0, 0);
            doc.setFontSize(12);
            let y = 40;
            doc.text('Classificação das ruas:', 14, y);
            y += 10;

            data.ruas.forEach(r => {
                let cor;
                if (r.classificacao === 'Crítica') cor = '#b71c1c';
                else if (r.classificacao === 'Moderada') cor = '#b85e00';
                else cor = '#2e7d32';
                doc.setTextColor(cor);
                doc.text(`${r.rua}: ${r.classificacao} (${r.pontuacao} pts)`, 20, y);
                y += 7;
            });

            doc.setTextColor(0,0,0);
            y += 5;
            doc.setFont('helvetica', 'bold');
            doc.text('Resumo das ocorrências críticas:', 14, y);
            y += 7;
            const criticas = data.ruas.filter(r => r.classificacao === 'Crítica');
            if (criticas.length === 0) {
                doc.text('Nenhuma rua classificada como crítica.', 20, y);
            } else {
                criticas.forEach(r => {
                    doc.setTextColor('#b71c1c');
                    doc.text(`- ${r.rua} (${r.pontuacao} pts)`, 20, y);
                    y += 7;
                });
            }

            addFooter();

            doc.save(`checklist_${manager.name.replace(' ','_')}_${Date.now()}.pdf`);
        }

        // ========== FINALIZAR ==========
        const finalizeBtn = document.getElementById('finalizeBtn');
        finalizeBtn.addEventListener('click', async function() {
            // PRIMEIRA VALIDAÇÃO: Verificar se todas as ruas do gestor foram preenchidas
            const ruasGestorOk = verificarTodasRuasGestorPreenchidas();
            if (!ruasGestorOk) {
                return; // Bloqueia a finalização se faltar ruas
            }

            const manager = getCurrentManager();
            const senha = document.getElementById('senhaValidacao').value.trim();
            if (!senha) {
                await showModal('Digite a senha.', 'Validação', '🔒');
                return;
            }
            if (senha !== manager.password) {
                await showModal('Senha incorreta!', 'Erro', '❌');
                return;
            }

            const data = collectAllData();
            if (!data) return;
            if (!data.allValid) {
                await showModal('Preencha todas as perguntas obrigatórias em todos os cards.', 'Atenção', '⚠️');
                return;
            }

            finalizeBtn.disabled = true;
            finalizeBtn.innerHTML = '<span class="spinner"></span> Gerando...';

            try {
                const signatureDataURL = signatureDrawn ? canvas.toDataURL('image/png') : null;
                await generateConsolidatedPDF(data, signatureDataURL);
                await showModal('PDF gerado com sucesso!', 'Concluído', '✅');
            } catch (error) {
                console.error('Erro ao gerar PDF:', error);
                await showModal('Ocorreu um erro ao gerar o PDF. Verifique o console para mais detalhes.', 'Erro', '❌');
            } finally {
                finalizeBtn.disabled = false;
                finalizeBtn.innerHTML = '🔒 Finalizar Checklist (Gerar PDF Consolidado)';
            }
        });

        updateManagerUI();
        initCanvas();
    })();
</script>
</body>
</html>
