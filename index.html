<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Check List - Carajás (Múltiplas Ruas)</title>
    <!-- jsPDF e html2canvas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }
        body {
            background: #f2f2f2;
            padding: 12px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            background: linear-gradient(rgba(255,255,255,0.9), rgba(255,255,255,0.9)), 
                        url('https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?ixlib=rb-4.0.3&auto=format&fit=crop&w=1350&q=80') no-repeat center center;
            background-size: cover;
            border-radius: 28px 28px 20px 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            overflow: hidden;
            padding: 20px 18px 30px;
        }
        .header {
            border-bottom: 2px solid #FFC600;
            padding-bottom: 12px;
            margin-bottom: 20px;
        }
        .header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #007269;
            letter-spacing: -0.5px;
            line-height: 1.2;
        }
        .header h1 span {
            color: #FF671F;
            font-weight: 800;
        }
        .manager-card {
            background: #f0f4fa;
            border-radius: 20px;
            padding: 16px;
            margin: 15px 0 20px;
            border-left: 8px solid #FF671F;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .manager-label {
            font-size: 0.85rem;
            text-transform: uppercase;
            color: #2c3e50;
            letter-spacing: 1px;
            font-weight: 600;
        }
        .manager-name {
            font-size: 1.6rem;
            font-weight: 800;
            color: #007269;
            line-height: 1.2;
        }
        .manager-shift {
            font-size: 1rem;
            color: #007269;
            font-weight: 500;
            background: rgba(0,114,105,0.1);
            display: inline-block;
            padding: 4px 14px;
            border-radius: 40px;
            margin-top: 6px;
        }
        .section-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #007269;
            margin: 24px 0 12px 0;
            padding-left: 8px;
            border-left: 6px solid #FFC600;
        }
        .rua-card {
            background: #ffffff;
            border-radius: 20px;
            padding: 16px 14px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border: 2px solid #007269;
            position: relative;
        }
        .rua-card h3 {
            color: #007269;
            margin-bottom: 15px;
            font-size: 1.3rem;
            padding-right: 30px;
        }
        .remove-rua {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #FF671F;
            color: white;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            font-weight: bold;
            cursor: pointer;
        }
        .question {
            font-weight: 600;
            font-size: 1.05rem;
            margin: 15px 0 8px;
            color: #1a2b3c;
        }
        .required-star {
            color: #FF671F;
            font-size: 1.3rem;
            line-height: 1;
            margin-left: 4px;
        }
        .hint {
            font-size: 0.85rem;
            color: #5e6f7d;
            margin-top: -5px;
            margin-bottom: 12px;
            font-style: italic;
            background: #f9fafc;
            padding: 6px 10px;
            border-radius: 12px;
        }
        .options {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }
        .option-item {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #f3f6f9;
            padding: 8px 16px;
            border-radius: 40px;
            border: 1px solid #d0dbe8;
        }
        .option-item input[type="radio"] {
            width: 20px;
            height: 20px;
            accent-color: #007269;
        }
        .file-area {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .file-btn {
            background: #FF671F;
            color: white;
            font-weight: 600;
            padding: 14px 20px;
            border-radius: 40px;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            display: inline-block;
            width: fit-content;
            box-shadow: 0 4px 8px rgba(255,103,31,0.3);
        }
        .image-preview-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }
        .preview-item {
            position: relative;
            width: 80px;
            height: 80px;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #007269;
        }
        .preview-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .remove-img {
            position: absolute;
            top: 2px;
            right: 2px;
            background: #FF671F;
            color: white;
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 12px;
            cursor: pointer;
        }
        .add-rua-btn {
            background: #007269;
            color: white;
            font-weight: 600;
            padding: 14px 20px;
            border-radius: 40px;
            border: none;
            font-size: 1.1rem;
            cursor: pointer;
            margin: 10px 0 20px;
            width: 100%;
        }
        .signature-area {
            margin: 20px 0 10px;
            background: #fafbfc;
            border-radius: 20px;
            padding: 16px;
            border: 1px dashed #007269;
        }
        .signature-canvas {
            width: 100%;
            height: auto;
            background: white;
            border: 2px solid #cbd5e1;
            border-radius: 16px;
            touch-action: none;
            aspect-ratio: 500 / 150;
        }
        .signature-actions {
            display: flex;
            gap: 12px;
            margin-top: 12px;
        }
        .signature-btn {
            background: #eaeef2;
            border: none;
            padding: 12px 18px;
            border-radius: 40px;
            font-weight: 600;
            color: #007269;
            flex: 1;
            cursor: pointer;
        }
        .signature-btn.clear {
            background: #f3d8d8;
            color: #a33b3b;
        }
        .password-field {
            width: 100%;
            padding: 16px 18px;
            border: 1px solid #cbd5e1;
            border-radius: 60px;
            font-size: 1.2rem;
            margin: 10px 0;
            text-align: center;
            letter-spacing: 4px;
        }
        .finalize-btn {
            background: #007269;
            color: white;
            font-size: 1.4rem;
            font-weight: 700;
            padding: 18px 20px;
            border: none;
            border-radius: 60px;
            width: 100%;
            margin-top: 30px;
            box-shadow: 0 8px 16px rgba(0,114,105,0.3);
            cursor: pointer;
        }
        .finalize-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        footer {
            text-align: center;
            color: #7f8c8d;
            font-size: 0.8rem;
            margin-top: 20px;
        }
        /* Modal de seleção de rua */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .modal-box {
            background: white;
            max-width: 350px;
            width: 90%;
            border-radius: 28px;
            padding: 24px 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border-left: 8px solid #FF671F;
        }
        .modal-box h3 {
            color: #007269;
            margin-bottom: 15px;
        }
        .modal-option {
            display: flex;
            align-items: center;
            padding: 12px;
            margin: 5px 0;
            background: #f3f6f9;
            border-radius: 40px;
            border: 1px solid #d0dbe8;
        }
        .modal-option input[type="radio"] {
            width: 20px;
            height: 20px;
            accent-color: #007269;
            margin-right: 10px;
        }
        .modal-option.disabled {
            opacity: 0.5;
            background: #e0e0e0;
        }
        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .modal-btn {
            flex: 1;
            background: #007269;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
        }
        .modal-btn.cancel {
            background: #ccc;
            color: #333;
        }
        .spinner {
            border: 4px solid rgba(0,0,0,0.1);
            border-left-color: #007269;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 10px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Check List <span>Carajás</span></h1>
    </div>

    <div class="manager-card" id="managerCard">
        <div class="manager-label">responsável do turno</div>
        <div class="manager-name" id="currentManagerName">Carregando...</div>
        <div class="manager-shift" id="currentManagerShift"></div>
    </div>

    <!-- Container das avaliações de ruas -->
    <div id="ruasContainer"></div>

    <button class="add-rua-btn" id="addRuaBtn">➕ Adicionar nova rua</button>

    <!-- Seção de assinatura e senha (global) -->
    <div class="section-title">Finalização do turno</div>
    <div class="question-group" style="background:white; border-radius:20px; padding:16px;">
        <div class="question">Assinatura do gerente (opcional)</div>
        <div class="signature-area">
            <canvas id="signatureCanvas" class="signature-canvas" width="500" height="150"></canvas>
            <div class="signature-actions">
                <button type="button" class="signature-btn" id="undoSignature">↩ Desfazer</button>
                <button type="button" class="signature-btn clear" id="clearSignature">🗑 Limpar</button>
            </div>
        </div>
        <div class="question">Senha de validação <span class="required-star">*</span></div>
        <input type="password" id="senhaValidacao" class="password-field" placeholder="****" maxlength="4" inputmode="numeric">
    </div>

    <button class="finalize-btn" id="finalizeBtn">🔒 Finalizar Checklist (Gerar PDF Consolidado)</button>
    <footer>Controle de Layout - Carajás • Múltiplas Ruas</footer>
</div>

<!-- Modal de seleção de rua -->
<div class="modal-overlay" id="ruaModal">
    <div class="modal-box">
        <h3>Selecione a rua</h3>
        <div id="modalOptionsContainer"></div>
        <div class="modal-actions">
            <button class="modal-btn cancel" id="modalCancel">Cancelar</button>
            <button class="modal-btn" id="modalConfirm">Confirmar</button>
        </div>
    </div>
</div>

<script>
    (function() {
        // ========== MODAL DE SELEÇÃO DE RUA ==========
        const ruaModal = document.getElementById('ruaModal');
        const modalOptions = document.getElementById('modalOptionsContainer');
        const modalConfirm = document.getElementById('modalConfirm');
        const modalCancel = document.getElementById('modalCancel');
        const ruasDisponiveis = ['Rua 8', 'Rua 11', 'Rua 12', 'Rua 13', 'Rua 14'];
        let currentResolve = null;

        function abrirModalSelecaoRua(ruasUsadas) {
            return new Promise((resolve) => {
                currentResolve = resolve;
                let html = '';
                ruasDisponiveis.forEach(rua => {
                    const disabled = ruasUsadas.includes(rua) ? 'disabled' : '';
                    html += `<div class="modal-option ${disabled ? 'disabled' : ''}">
                        <input type="radio" name="modalRua" value="${rua}" ${disabled} id="rua_${rua.replace(' ','')}">
                        <label for="rua_${rua.replace(' ','')}">${rua}</label>
                    </div>`;
                });
                modalOptions.innerHTML = html;
                ruaModal.style.display = 'flex';

                modalConfirm.onclick = () => {
                    const selecionado = document.querySelector('input[name="modalRua"]:checked');
                    if (!selecionado) {
                        alert('Selecione uma rua.');
                        return;
                    }
                    ruaModal.style.display = 'none';
                    currentResolve(selecionado.value);
                };

                modalCancel.onclick = () => {
                    ruaModal.style.display = 'none';
                    currentResolve(null);
                };
            });
        }

        // ========== TURNOS ==========
        const managers = [
            { name: "Eduardo Barbosa", shift: "06:00 – 14:00", start: 6, end: 14, password: "1111" },
            { name: "Amanda Bertulino", shift: "14:00 – 22:00", start: 14, end: 22, password: "2222" },
            { name: "Christopher Borges", shift: "22:00 – 06:00", start: 22, end: 6, password: "3333" }
        ];
        function getCurrentManager() {
            const hour = new Date().getHours();
            for (let m of managers) {
                if (m.start < m.end) { if (hour >= m.start && hour < m.end) return m; }
                else { if (hour >= m.start || hour < m.end) return m; }
            }
            return managers[0];
        }
        function updateManagerUI() {
            const m = getCurrentManager();
            document.getElementById('currentManagerName').innerText = m.name;
            document.getElementById('currentManagerShift').innerText = `Turno • ${m.shift}`;
            return m;
        }

        // ========== GERENCIAMENTO DAS RUAS ==========
        const ruasContainer = document.getElementById('ruasContainer');
        let ruasData = [];

        function getRuasUsadas() {
            return ruasData.map(card => card.ruaSelecionada).filter(r => r);
        }

        async function adicionarRua() {
            const ruasUsadas = getRuasUsadas();
            const ruaEscolhida = await abrirModalSelecaoRua(ruasUsadas);
            if (!ruaEscolhida) return;

            const index = ruasData.length;
            const card = document.createElement('div');
            card.className = 'rua-card';
            card.innerHTML = `
                <h3>${ruaEscolhida}</h3>
                <button class="remove-rua">✕</button>
                <div class="question">A rua está obstruída? <span class="required-star">*</span></div>
                <div class="hint">Objetos dificultando a circulação</div>
                <div class="options">
                    <label class="option-item"><input type="radio" name="obstruida_${index}" value="Sim" required> Sim</label>
                    <label class="option-item"><input type="radio" name="obstruida_${index}" value="Não"> Não</label>
                </div>
                <div class="question">Rua está limpa? <span class="required-star">*</span></div>
                <div class="options">
                    <label class="option-item"><input type="radio" name="limpa_${index}" value="Sim" required> Sim</label>
                    <label class="option-item"><input type="radio" name="limpa_${index}" value="Não"> Não</label>
                </div>
                <div class="question">Existem Pallets fora da demarcação? <span class="required-star">*</span></div>
                <div class="hint">Linha amarela delimitando armazenamento</div>
                <div class="options">
                    <label class="option-item"><input type="radio" name="palletsFora_${index}" value="Mais de 5" required> Mais de 5</label>
                    <label class="option-item"><input type="radio" name="palletsFora_${index}" value="Menos de 5"> Menos de 5</label>
                    <label class="option-item"><input type="radio" name="palletsFora_${index}" value="Não há Pallets para armazenar"> Não há Pallets</label>
                </div>
                <div class="question">Existem pallets na rua para serem armazenados? <span class="required-star">*</span></div>
                <div class="options">
                    <label class="option-item"><input type="radio" name="palletsRua_${index}" value="Sim" required> Sim</label>
                    <label class="option-item"><input type="radio" name="palletsRua_${index}" value="Não"> Não</label>
                </div>
                <div class="question">Existem Avarias? <span class="required-star">*</span></div>
                <div class="options">
                    <label class="option-item"><input type="radio" name="avarias_${index}" value="Mais de 5" required> Mais de 5</label>
                    <label class="option-item"><input type="radio" name="avarias_${index}" value="Menos de 5"> Menos de 5</label>
                    <label class="option-item"><input type="radio" name="avarias_${index}" value="Não foi encontrada avarias"> Não encontrada</label>
                </div>
                <div class="question">Prédios sinalizados? <span class="required-star">*</span></div>
                <div class="options">
                    <label class="option-item"><input type="radio" name="prediosSinalizados_${index}" value="Sim" required> Sim</label>
                    <label class="option-item"><input type="radio" name="prediosSinalizados_${index}" value="Não"> Não</label>
                    <label class="option-item"><input type="radio" name="prediosSinalizados_${index}" value="Parcialmente"> Parcialmente</label>
                </div>
                <div class="question">Existem divergência de produtos armazenados? <span class="required-star">*</span></div>
                <div class="hint">Mais de um fornecedor no mesmo endereço?</div>
                <div class="options">
                    <label class="option-item"><input type="radio" name="divergencia_${index}" value="Sim" required> Sim</label>
                    <label class="option-item"><input type="radio" name="divergencia_${index}" value="Não"> Não</label>
                </div>
                <div class="question">Anexar fotos (máx 4)</div>
                <div class="file-area">
                    <label class="file-btn" for="fileInput_${index}">Adicionar arquivos</label>
                    <input type="file" id="fileInput_${index}" accept="image/*" multiple style="display:none;">
                    <div class="image-preview-grid" id="preview_${index}"></div>
                </div>
            `;

            ruasContainer.appendChild(card);

            const cardData = {
                element: card,
                ruaSelecionada: ruaEscolhida,
                images: [],
                fileInput: card.querySelector(`#fileInput_${index}`),
                previewDiv: card.querySelector(`#preview_${index}`)
            };
            ruasData.push(cardData);

            cardData.fileInput.addEventListener('change', async function(e) {
                let files = Array.from(e.target.files);
                if (files.length > 4) {
                    alert('Máximo 4 imagens. Primeiras 4 serão usadas.');
                    files = files.slice(0, 4);
                }
                cardData.images = [];
                for (let file of files) {
                    const dataURL = await readFileAsDataURL(file);
                    cardData.images.push({ file, dataURL });
                }
                atualizarPreview(cardData);
                const dt = new DataTransfer();
                cardData.images.forEach(img => dt.items.add(img.file));
                cardData.fileInput.files = dt.files;
            });

            card.querySelector('.remove-rua').addEventListener('click', function() {
                if (ruasData.length > 1) {
                    const idx = ruasData.indexOf(cardData);
                    ruasData.splice(idx, 1);
                    card.remove();
                } else {
                    alert('É necessário pelo menos uma rua.');
                }
            });
        }

        function atualizarPreview(cardData) {
            const container = cardData.previewDiv;
            if (cardData.images.length === 0) {
                container.innerHTML = '';
                return;
            }
            let html = '';
            cardData.images.forEach((img, idx) => {
                html += `<div class="preview-item">
                    <img src="${img.dataURL}" alt="preview">
                    <button class="remove-img" data-index="${idx}">✕</button>
                </div>`;
            });
            container.innerHTML = html;
            container.querySelectorAll('.remove-img').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.preventDefault();
                    const i = parseInt(this.dataset.index);
                    cardData.images.splice(i, 1);
                    atualizarPreview(cardData);
                    const dt = new DataTransfer();
                    cardData.images.forEach(img => dt.items.add(img.file));
                    cardData.fileInput.files = dt.files;
                });
            });
        }

        function readFileAsDataURL(file) {
            return new Promise(resolve => {
                const reader = new FileReader();
                reader.onload = e => resolve(e.target.result);
                reader.readAsDataURL(file);
            });
        }

        window.addEventListener('load', async function() {
            updateManagerUI();
            initCanvas();
            setTimeout(async () => {
                await adicionarRua();
            }, 100);
        });

        document.getElementById('addRuaBtn').addEventListener('click', adicionarRua);

        // ========== ASSINATURA CANVAS ==========
        const canvas = document.getElementById('signatureCanvas');
        const ctx = canvas.getContext('2d');
        let signatureDrawn = false;
        let undoStack = [];

        function initCanvas() {
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.lineWidth = 2;
            ctx.lineCap = 'round';
            ctx.strokeStyle = '#007269';
            signatureDrawn = false;
            undoStack = [canvas.toDataURL()];
        }

        function saveState() {
            undoStack.push(canvas.toDataURL());
            if (undoStack.length > 20) undoStack.shift();
        }

        function getCanvasCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let clientX, clientY;
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
        }

        let drawing = false;
        function startDrawing(e) {
            e.preventDefault();
            drawing = true;
            signatureDrawn = true;
            const { x, y } = getCanvasCoords(e);
            ctx.beginPath();
            ctx.moveTo(x, y);
        }
        function draw(e) {
            e.preventDefault();
            if (!drawing) return;
            const { x, y } = getCanvasCoords(e);
            ctx.lineTo(x, y);
            ctx.stroke();
        }
        function stopDrawing(e) {
            e.preventDefault();
            if (drawing) {
                drawing = false;
                ctx.closePath();
                saveState();
            }
        }
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseleave', stopDrawing);
        canvas.addEventListener('touchstart', startDrawing, { passive: false });
        canvas.addEventListener('touchmove', draw, { passive: false });
        canvas.addEventListener('touchend', stopDrawing);

        document.getElementById('undoSignature').addEventListener('click', function() {
            if (undoStack.length > 1) {
                undoStack.pop();
                const img = new Image();
                img.src = undoStack[undoStack.length-1];
                img.onload = () => {
                    ctx.clearRect(0,0,canvas.width,canvas.height);
                    ctx.drawImage(img,0,0,canvas.width,canvas.height);
                };
                signatureDrawn = undoStack.length > 1;
            } else {
                alert('Nada para desfazer.');
            }
        });

        document.getElementById('clearSignature').addEventListener('click', function() {
            if (confirm('Tem certeza que deseja limpar a assinatura?')) {
                ctx.clearRect(0,0,canvas.width,canvas.height);
                ctx.fillStyle = 'white';
                ctx.fillRect(0,0,canvas.width,canvas.height);
                signatureDrawn = false;
                undoStack = [canvas.toDataURL()];
            }
        });

        // ========== FUNÇÕES DE COLETA E VALIDAÇÃO ==========
        function collectAllData() {
            const manager = getCurrentManager();
            const ruas = [];
            let allValid = true;

            ruasData.forEach(card => {
                if (!card.ruaSelecionada) {
                    allValid = false;
                    return;
                }

                const obstruida = card.element.querySelector('input[name^="obstruida_"]:checked')?.value;
                const limpa = card.element.querySelector('input[name^="limpa_"]:checked')?.value;
                const palletsFora = card.element.querySelector('input[name^="palletsFora_"]:checked')?.value;
                const palletsRua = card.element.querySelector('input[name^="palletsRua_"]:checked')?.value;
                const avarias = card.element.querySelector('input[name^="avarias_"]:checked')?.value;
                const predios = card.element.querySelector('input[name^="prediosSinalizados_"]:checked')?.value;
                const divergencia = card.element.querySelector('input[name^="divergencia_"]:checked')?.value;

                if (!obstruida || !limpa || !palletsFora || !palletsRua || !avarias || !predios || !divergencia) {
                    allValid = false;
                    return;
                }

                let score = 0;
                if (obstruida === 'Sim') score += 2;
                if (limpa === 'Não') score += 2;
                if (palletsFora === 'Mais de 5') score += 3;
                else if (palletsFora === 'Menos de 5') score += 1;
                if (palletsRua === 'Sim') score += 1;
                if (avarias === 'Mais de 5') score += 3;
                else if (avarias === 'Menos de 5') score += 1;
                if (predios === 'Não') score += 2;
                else if (predios === 'Parcialmente') score += 1;
                if (divergencia === 'Sim') score += 2;

                let classificacao = 'Aceitável';
                if (score > 3) classificacao = 'Moderada';
                if (score > 7) classificacao = 'Crítica';

                ruas.push({
                    rua: card.ruaSelecionada,
                    obstruida,
                    limpa,
                    palletsFora,
                    palletsRua,
                    avarias,
                    predios,
                    divergencia,
                    pontuacao: score,
                    classificacao,
                    images: card.images.map(img => ({ name: img.file.name, dataURL: img.dataURL }))
                });
            });

            return { manager, ruas, allValid };
        }

        // ========== GERAR PDF CONSOLIDADO COM RODAPÉ EM TODAS AS PÁGINAS ==========
        async function generateConsolidatedPDF(data, signatureDataURL) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const manager = data.manager;
            const dateStr = new Date().toLocaleString('pt-BR');
            const totalPages = data.ruas.length + data.ruas.reduce((acc, r) => acc + r.images.length, 0); // páginas de ruas + fotos (cada foto uma página)

            // Função para adicionar rodapé na página atual
            function addFooter() {
                const pageWidth = doc.internal.pageSize.width;
                const pageHeight = doc.internal.pageSize.height;
                const margin = 14;
                const footerY = pageHeight - 15; // 15mm do fim

                doc.setDrawColor(200,200,200);
                doc.line(margin, footerY - 3, pageWidth - margin, footerY - 3);

                // Se tiver assinatura, coloca no rodapé
                if (signatureDataURL && signatureDrawn) {
                    // Redimensionar assinatura para altura 10mm
                    const sigHeight = 10;
                    const sigWidth = (canvas.width / canvas.height) * sigHeight; // proporção
                    doc.addImage(signatureDataURL, 'PNG', margin, footerY - sigHeight, sigWidth, sigHeight);
                    // Texto ao lado
                    doc.setFontSize(8);
                    doc.text(`Assinado por: ${manager.name} - ${dateStr}`, margin + sigWidth + 5, footerY - 2);
                } else {
                    doc.setFontSize(8);
                    doc.text(`Documento gerado por: ${manager.name} - ${dateStr}`, margin, footerY - 2);
                }
            }

            // Para cada rua
            for (let i = 0; i < data.ruas.length; i++) {
                if (i > 0) doc.addPage();
                const r = data.ruas[i];

                doc.setFillColor(0, 114, 105);
                doc.rect(0, 0, 210, 20, 'F');
                doc.setTextColor(255, 255, 255);
                doc.setFontSize(16);
                doc.text('Controle de Layout - Carajás', 14, 14);

                doc.setTextColor(0, 0, 0);
                doc.setFontSize(10);
                doc.text(`Gerente: ${manager.name} (${manager.shift})`, 14, 30);
                doc.text(`Data: ${dateStr}`, 14, 37);
                doc.text(`Rua: ${r.rua}`, 14, 44);

                doc.line(14, 48, 196, 48);

                let y = 58;
                const fields = [
                    ['Obstruída', r.obstruida],
                    ['Limpa', r.limpa],
                    ['Pallets fora', r.palletsFora],
                    ['Pallets na rua', r.palletsRua],
                    ['Avarias', r.avarias],
                    ['Prédios sinalizados', r.predios],
                    ['Divergência', r.divergencia],
                    ['Classificação', `${r.classificacao} (${r.pontuacao} pts)`]
                ];
                fields.forEach(([label, value]) => {
                    doc.text(`${label}: ${value}`, 14, y);
                    y += 7;
                });

                // Se houver fotos, já adicionamos páginas extras depois
                // Agora adiciona rodapé na página atual
                addFooter();

                // Páginas de fotos para esta rua
                for (let j = 0; j < r.images.length; j++) {
                    doc.addPage();
                    doc.setFillColor(0, 114, 105);
                    doc.rect(0, 0, 210, 15, 'F');
                    doc.setTextColor(255, 255, 255);
                    doc.setFontSize(12);
                    doc.text(`Foto ${j+1} - ${r.rua}`, 14, 11);
                    doc.setTextColor(0, 0, 0);
                    doc.addImage(r.images[j].dataURL, 'JPEG', 10, 20, 190, 0, undefined, 'FAST');
                    addFooter();
                }
            }

            // Se houver assinatura mas nenhuma rua (nunca) - não precisa
            doc.save(`checklist_${manager.name.replace(' ','_')}_${Date.now()}.pdf`);
        }

        // ========== FINALIZAR ==========
        const finalizeBtn = document.getElementById('finalizeBtn');
        finalizeBtn.addEventListener('click', async function() {
            const manager = getCurrentManager();
            const senha = document.getElementById('senhaValidacao').value.trim();
            if (!senha) {
                alert('Digite a senha.');
                return;
            }
            if (senha !== manager.password) {
                alert('Senha incorreta!');
                return;
            }

            const data = collectAllData();
            if (!data.allValid) {
                alert('Preencha todas as perguntas obrigatórias em todos os cards.');
                return;
            }

            finalizeBtn.disabled = true;
            finalizeBtn.innerHTML = '<span class="spinner"></span> Gerando...';

            const signatureDataURL = signatureDrawn ? canvas.toDataURL('image/png') : null;
            await generateConsolidatedPDF(data, signatureDataURL);

            finalizeBtn.disabled = false;
            finalizeBtn.innerHTML = '🔒 Finalizar Checklist (Gerar PDF Consolidado)';
            alert('PDF gerado com sucesso!');
        });

        updateManagerUI();
        initCanvas();
        setInterval(updateManagerUI, 60000);
    })();
</script>
